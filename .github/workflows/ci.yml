name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validated stack
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python entrypoints
        run: |
          python -m compileall open_rlhf scripts eval web_demo

      - name: Run pipeline smoke tests
        run: |
          python -m pytest -q
